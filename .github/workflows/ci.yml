name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Syntax check
        run: python -c "import ast; ast.parse(open('ytt.py', encoding='utf-8').read()); print('ytt.py OK')"
      - name: Import check (deps installed)
        run: |
          pip install -r requirements.txt
          python -c "import ytt; print('import OK; formats =', sorted(ytt.FORMATTERS))"
